<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NanoJanus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&display=swap');

  :root {
    --bg: #0a0a0f;
    --fg: #e8e8e0;
    --dim: #666;
    --ghost: #444;
    --accent-fwd: #4a9eff;
    --accent-bwd: #ff6b4a;
    --accent-origin: #ffd700;
    --serif: 'EB Garamond', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--serif);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #logo {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #555;
    user-select: none;
    font-weight: 500;
  }

  #janus-faces {
    position: fixed;
    top: 14px;
    right: 28px;
    font-size: 20px;
    color: #555;
    user-select: none;
    opacity: 0.5;
  }

  #metrics {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 1px;
    text-align: center;
    font-family: monospace;
  }

  #arena {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 40px 120px;
    overflow-y: auto;
  }

  #column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
    max-width: 700px;
  }

  .word-line {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(12px);
    animation: word-arrive 0.8s ease forwards;
    text-align: center;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .word-line.backward {
    color: var(--accent-bwd);
    animation-name: word-arrive-up;
  }

  .word-line.forward {
    color: var(--accent-fwd);
  }

  .word-line.origin {
    color: var(--accent-origin);
    font-weight: 700;
    font-size: 24px;
    border: 1px solid var(--accent-origin);
    padding: 4px 16px;
  }

  .word-line.wormhole {
    font-style: italic;
    text-decoration: underline;
    text-decoration-style: dotted;
  }

  .step-num {
    font-size: 9px;
    color: var(--dim);
    margin-right: 8px;
    font-family: monospace;
  }

  .step-debt {
    font-size: 9px;
    color: var(--ghost);
    margin-left: 8px;
    font-family: monospace;
  }

  @keyframes word-arrive {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes word-arrive-up {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #separator {
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-origin), transparent);
    margin: 12px 0;
    opacity: 0;
    animation: fade-in 1s ease forwards;
  }

  @keyframes fade-in { to { opacity: 1; } }

  /* input */
  #input-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    justify-content: center;
    background: linear-gradient(transparent, var(--bg) 30%);
  }

  #input-bar input {
    width: 500px;
    max-width: 70vw;
    padding: 12px 20px;
    font-size: 16px;
    font-family: var(--serif);
    background: #161620;
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--fg);
    outline: none;
  }

  #input-bar input:focus { border-color: var(--accent-fwd); }

  #input-bar button {
    padding: 12px 24px;
    font-family: var(--serif);
    font-size: 14px;
    background: #1a1a2e;
    color: var(--fg);
    border: 1px solid #333;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #input-bar button:hover { border-color: var(--accent-fwd); }

</style>
</head>
<body>

<div id="logo">N A N O J A N U S</div>
<div id="janus-faces">◄ ►</div>
<div id="metrics"></div>

<div id="arena">
  <div id="column"></div>
</div>

<div id="input-bar">
  <input id="prompt" type="text" placeholder="speak to janus..." autofocus />
  <button id="send">RESONATE</button>
</div>

//   - Dual weight matrices blended by calendar drift
//   - 12 bi-directional steps (forward + backward)
//   - Kuramoto chambers (6 coupled oscillators)
//   - MetaJanus birth date mathematical "self"
//   - Chuck optimizer for training
//
// NanoJanus-specific (not in full Janus):
//   - Word-level steps (full Janus generates sentences)
//   - "Charged word" origin selection from prompt

// ═══ 1984 WORD VOCABULARY (loaded from nanojanus.txt) ═══
const WORDS = [];
let NWORDS = 0;
const VOCAB_LENS = [];

// Precomputed BPE encoding for each vocabulary word
let vocabBpe = [];

// Extended vocabulary: hardcoded words + whole-word BPE tokens
// Each entry: {word: string, bpeIds: number[], fromHardcoded: boolean, origIdx: number}
// origIdx = index in WORDS[] for hardcoded, -1 for BPE-derived
let extVocab = [];

// Weight loading state
let hasWeights = false;

// ═══ BPE TOKENIZER (real byte-pair encoding, from penelope.c) ═══

function bpeEncode(text) {
  // 1. Convert to lowercase byte values
  let seq = [];
  for (let i = 0; i < text.length; i++) {
    let c = text.charCodeAt(i);
    if (c >= 65 && c <= 90) c = c - 65 + 97;
    if (c < 256) seq.push(c);
  }
  // 2. Apply merges in priority order
  for (let m = 0; m < BPE_MERGES; m++) {
    const left = BPE_TABLE[m][0], right = BPE_TABLE[m][1];
    const newId = 256 + m;
    const out = [];
    for (let i = 0; i < seq.length; i++) {
      if (i < seq.length - 1 && seq[i] === left && seq[i+1] === right) {
        out.push(newId);
        i++;
      } else {
        out.push(seq[i]);
      }
    }
    seq = out;
  }
  return seq;
}

function initVocabBpe() {
  vocabBpe = [];
  for (let i = 0; i < NWORDS; i++)
    vocabBpe.push(bpeEncode(WORDS[i]));
}

// ═══ BPE DECODE — build reverse mapping from token ID to string ═══
// Base tokens 0..255 = single bytes. Each merge m creates token (256+m)
// by concatenating the strings of its two operands.
const bpeStrs = [];

function buildBpeStrs() {
  bpeStrs.length = 0;
  // Base: each byte is its character
  for (let i = 0; i < 256; i++)
    bpeStrs.push(String.fromCharCode(i));
  // Merges: token (256+m) = concat of left and right operand strings
  for (let m = 0; m < BPE_MERGES; m++) {
    const left = BPE_TABLE[m][0], right = BPE_TABLE[m][1];
    bpeStrs.push((bpeStrs[left] || '') + (bpeStrs[right] || ''));
  }
}

function bpeDecode(tokenId) {
  if (bpeStrs.length === 0) buildBpeStrs();
  if (tokenId >= 0 && tokenId < bpeStrs.length) return bpeStrs[tokenId];
  return '';
}

// ═══ EXTENDED VOCAB — hardcoded words + whole-word BPE tokens ═══
function buildExtendedVocab() {
  extVocab = [];
  const wordSet = new Set();

  // 1. All hardcoded vocabulary words (with their precomputed BPE encodings)
  for (let i = 0; i < NWORDS; i++) {
    extVocab.push({
      word: WORDS[i],
      bpeIds: vocabBpe[i],
      fromHardcoded: true,
      origIdx: i
    });
    wordSet.add(WORDS[i].toLowerCase());
  }

  // 2. Scan every BPE token (0..BPE_VOCAB-1) for whole words
  //    A "whole word" = only lowercase a-z, length >= 2
  if (bpeStrs.length === 0) buildBpeStrs();
  const wholeWordRe = /^[a-z]{2,}$/;
  let bpeAdded = 0;

  for (let t = 0; t < BPE_VOCAB; t++) {
    const s = bpeStrs[t];
    if (!s) continue;
    const lower = s.toLowerCase();
    if (!wholeWordRe.test(lower)) continue;
    if (wordSet.has(lower)) continue;
    // This BPE token decodes to a whole word not in hardcoded vocab
    extVocab.push({
      word: lower,
      bpeIds: [t],  // single token encodes the whole word
      fromHardcoded: false,
      origIdx: -1
    });
    wordSet.add(lower);
    bpeAdded++;
  }

  const hardcoded = NWORDS;
  console.log('[nanojanus] extended vocab: ' + extVocab.length + ' words (' +
    hardcoded + ' hardcoded + ' + bpeAdded + ' from BPE)');
}

// Word-level tokenizer (for finding "charged word" origin — nanojanus-specific)
const SUFFIXES = ['ing','tion','sion','ment','ness','able','ible','ful','less','ous','ive','ity','ary','ery','ory','al','ly','er','ed','es','en','s'];

function tryStem(word) {
  for (const suf of SUFFIXES) {
    if (word.length > suf.length + 2 && word.endsWith(suf)) {
      const idx = WORDS.indexOf(word.slice(0, -suf.length));
      if (idx >= 0) return idx;
    }
  }
  return -1;
}

function tokenizeWords(text) {
  const words = text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 0);
  const ids = [];
  for (const w of words) {
    const idx = WORDS.indexOf(w);
    if (idx >= 0) { ids.push(idx); continue; }
    const stemIdx = tryStem(w);
    if (stemIdx >= 0) { ids.push(stemIdx); continue; }
  }
  return ids;
}

// ═══ CALENDAR DRIFT (from ariannamethod.c) ═══
const AM_ANNUAL_DRIFT = 11.25;
const AM_GREGORIAN_YEAR = 365.25;
const AM_METONIC_YEARS = 19;
const AM_METONIC_LEAPS = 7;
const AM_MAX_UNCORRECTED = 33.0;
const METONIC_LEAP_YEARS = [3, 6, 8, 11, 14, 17, 19];
const EPOCH = new Date(2024, 9, 3, 12, 0, 0);

function calendarDaysSinceEpoch() {
  return Math.floor((Date.now() - EPOCH.getTime()) / 86400000);
}

function calendarCumulativeDrift(days) {
  const years = days / AM_GREGORIAN_YEAR;
  let baseDrift = years * AM_ANNUAL_DRIFT;
  const fullCycles = Math.floor(years / AM_METONIC_YEARS);
  let corrections = fullCycles * AM_METONIC_LEAPS * 30;
  const partial = years % AM_METONIC_YEARS;
  const yic = Math.floor(partial) + 1;
  for (let i = 0; i < AM_METONIC_LEAPS; i++)
    if (METONIC_LEAP_YEARS[i] <= yic) corrections += 30;
  return baseDrift - corrections;
}

function calendarDissonance(days) {
  const drift = calendarCumulativeDrift(days);
  const raw = Math.abs(drift % AM_MAX_UNCORRECTED) / AM_MAX_UNCORRECTED;
  return Math.max(0, Math.min(1, raw));
}

// ═══ METAJANUS — birth snapshot ═══
const META = {
  birthDays: calendarDaysSinceEpoch(),
  birthDrift: calendarCumulativeDrift(calendarDaysSinceEpoch()),
  birthDissonance: calendarDissonance(calendarDaysSinceEpoch()),
  birthTime: Date.now(),
  prophecyAccuracy: 0.5,
  totalPredictions: 0
};

function personalDissonance() {
  const nowDrift = calendarCumulativeDrift(calendarDaysSinceEpoch());
  return Math.max(0, Math.min(1, Math.abs(nowDrift - META.birthDrift) / AM_MAX_UNCORRECTED));
}

// ═══ AML PHYSICS ═══
let prophecyDebt = 0;
let destinyBias = 0.1;
let wormhole = 0.02;
let resonanceField = 0.5;
let trauma = 0;

function computeProphecyDebt(scores, chosenIdx) {
  if (scores.length === 0) return 0;
  const max = Math.max(...scores.map(s => s.score));
  const chosen = scores[chosenIdx]?.score || 0;
  const diff = max - chosen;
  return diff > 0 ? diff / (diff + 1) : 0;
}

// ═══ KURAMOTO CHAMBERS ═══
const CH = { FEAR: 0, LOVE: 1, RAGE: 2, VOID: 3, FLOW: 4, COMPLEX: 5, N: 6 };
const chambers = new Float32Array(CH.N);
const chDecay = [0.95, 0.95, 0.93, 0.96, 0.94, 0.97];

function updateChambers(stepIdx) {
  const depth = stepIdx / STEPS;
  if (depth < 0.33) chambers[CH.FLOW] += 0.05;
  else if (depth < 0.66) chambers[CH.FEAR] += 0.04;
  else chambers[CH.VOID] += 0.05;
  if (depth > 0.75) chambers[CH.COMPLEX] += 0.03;
  if (trauma > 0.3) chambers[CH.RAGE] += 0.04;
  const K = 0.02, old = new Float32Array(chambers);
  for (let i = 0; i < CH.N; i++) {
    for (let j = 0; j < CH.N; j++)
      if (i !== j) chambers[i] += K * Math.sin(old[j] - old[i]);
    chambers[i] = Math.max(0, Math.min(1, chambers[i] * chDecay[i]));
  }
}

// ═══ DUAL WEIGHT MATRICES — BPE input + word output (no weight tying) ═══
let embed_in_A, embed_in_B;     // [BPE_VOCAB * DIM] — BPE subword input embeddings
let embed_out_A, embed_out_B;   // [NWORDS * DIM]    — word output embeddings
const stepWrA = [], stepWrB = [];
const stepRmsA = [], stepRmsB = [];
const stepGateA = [], stepUpA = [], stepDownA = [];
const stepGateB = [], stepUpB = [], stepDownB = [];

function initWeights() {
  const scale = Math.sqrt(2 / DIM) * 0.02;
  const scaleBpe = Math.sqrt(2 / BPE_VOCAB) * 0.02;

  embed_in_A = new Float32Array(BPE_VOCAB * DIM);
  embed_in_B = new Float32Array(BPE_VOCAB * DIM);
  embed_out_A = new Float32Array(NWORDS * DIM);
  embed_out_B = new Float32Array(NWORDS * DIM);

  for (let i = 0; i < BPE_VOCAB * DIM; i++) {
    embed_in_A[i] = (Math.random() - 0.5) * scaleBpe;
    embed_in_B[i] = (Math.random() - 0.5) * scaleBpe;
  }
  for (let i = 0; i < NWORDS * DIM; i++) {
    embed_out_A[i] = (Math.random() - 0.5) * scale;
    embed_out_B[i] = (Math.random() - 0.5) * scale;
  }

  stepWrA.length = 0; stepWrB.length = 0;
  stepRmsA.length = 0; stepRmsB.length = 0;
  stepGateA.length = 0; stepUpA.length = 0; stepDownA.length = 0;
  stepGateB.length = 0; stepUpB.length = 0; stepDownB.length = 0;

  for (let s = 0; s < STEPS; s++) {
    stepWrA.push(new Float32Array(DIM * DIM));
    stepWrB.push(new Float32Array(DIM * DIM));
    stepRmsA.push(new Float32Array(DIM).fill(1));
    stepRmsB.push(new Float32Array(DIM).fill(1));
    // gate/up: [HDIM × DIM], down: [DIM × HDIM] (matches penelope.c layout)
    stepGateA.push(new Float32Array(HDIM * DIM));
    stepUpA.push(new Float32Array(HDIM * DIM));
    stepDownA.push(new Float32Array(DIM * HDIM));
    stepGateB.push(new Float32Array(HDIM * DIM));
    stepUpB.push(new Float32Array(HDIM * DIM));
    stepDownB.push(new Float32Array(DIM * HDIM));
    for (let i = 0; i < DIM * DIM; i++) {
      stepWrA[s][i] = (Math.random() - 0.5) * scale;
      stepWrB[s][i] = (Math.random() - 0.5) * scale;
    }
    for (let i = 0; i < HDIM * DIM; i++) {
      stepGateA[s][i] = (Math.random() - 0.5) * scale;
      stepUpA[s][i] = (Math.random() - 0.5) * scale;
      stepGateB[s][i] = (Math.random() - 0.5) * scale;
      stepUpB[s][i] = (Math.random() - 0.5) * scale;
    }
    for (let i = 0; i < DIM * HDIM; i++) {
      stepDownA[s][i] = (Math.random() - 0.5) * scale;
      stepDownB[s][i] = (Math.random() - 0.5) * scale;
    }
  }
}

// ═══ ASYNC VOCABULARY LOADING ═══
async function loadVocabulary() {
  try {
    const resp = await fetch('nanojanus.txt');
    if (!resp.ok) throw new Error('fetch failed: ' + resp.status);
    const text = await resp.text();
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    WORDS.length = 0;
    for (const l of lines) WORDS.push(l);
  } catch(e) {
    document.getElementById('column').innerHTML =
      '<div style="color:#ff6b4a;font-size:16px;text-align:center;padding:40px">' +
      'nanojanus.txt not found.<br>Serve with: python3 -m http.server</div>';
    console.error('[nanojanus] ' + e.message);
    return;
  }
  VOCAB_LENS.length = 0;
  for (const w of WORDS) VOCAB_LENS.push(w.length);
  NWORDS = WORDS.length;
  initWeights();
  initVocabBpe();
  buildBpeStrs();
  buildExtendedVocab();
  updateMetrics();
  console.log('[nanojanus] ready: ' + NWORDS + ' words, BPE vocab ' + BPE_VOCAB + ', ' + BPE_MERGES + ' merges');
}
loadVocabulary();

// ═══ BLEND ═══
function getBlendAlpha() {
  const cd = calendarDissonance(calendarDaysSinceEpoch());
  const pd = personalDissonance();
  return Math.max(0, Math.min(1, 0.5 + 0.3*(cd-0.5) - 0.2*prophecyDebt + 0.1*pd));
}

// ═══ CO-OCCURRENCE + BIGRAMS ═══
const cooc = new Map();
const bigrams = new Map();

function updateCooc(w1, w2) {
  const key = Math.min(w1,w2) + ',' + Math.max(w1,w2);
  cooc.set(key, (cooc.get(key)||0) + 1);
}
function getCooc(w1, w2) {
  return cooc.get(Math.min(w1,w2) + ',' + Math.max(w1,w2)) || 0;
}
function updateBigram(prev, next) {
  const key = prev + ',' + next;
  bigrams.set(key, (bigrams.get(key)||0) + 1);
}
function getBigram(prev, next) {
  return bigrams.get(prev + ',' + next) || 0;
}

// ═══ FORWARD STEP — pool_context → Wr → RMSNorm → SwiGLU → logits ═══
// Architecture from penelope.c, adapted for Janus dual matrices

function silu(x) { return x > -20 ? x / (1 + Math.exp(-x)) : 0; }

function forwardStep(bpeIds, stepIdx) {
  const s = stepIdx % STEPS;
  const a = getBlendAlpha(), b = 1 - a;

  // Pool context: average blended embed_in over all BPE tokens
  const ctx = new Float32Array(DIM);
  const n = bpeIds.length || 1;
  for (const id of bpeIds) {
    if (id >= BPE_VOCAB) continue;
    for (let d = 0; d < DIM; d++)
      ctx[d] += a * embed_in_A[id*DIM+d] + b * embed_in_B[id*DIM+d];
  }
  for (let d = 0; d < DIM; d++) ctx[d] /= n;

  // RRPRAM: query = ctx @ Wr (blended)
  const query = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++) {
    let sum = 0;
    for (let j = 0; j < DIM; j++)
      sum += (a*stepWrA[s][i*DIM+j] + b*stepWrB[s][i*DIM+j]) * ctx[j];
    query[i] = sum;
  }

  // RMSNorm
  let ss = 0;
  for (let i = 0; i < DIM; i++) ss += query[i]*query[i];
  const rmsInv = 1 / Math.sqrt(ss/DIM + 1e-5);
  const qn = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++)
    qn[i] = (a*stepRmsA[s][i] + b*stepRmsB[s][i]) * query[i] * rmsInv;

  // SwiGLU: gate[HDIM] = W_gate[HDIM,DIM] @ qn[DIM]
  const gate = new Float32Array(HDIM);
  const up = new Float32Array(HDIM);
  for (let i = 0; i < HDIM; i++) {
    let sg = 0, su = 0;
    for (let j = 0; j < DIM; j++) {
      sg += (a*stepGateA[s][i*DIM+j] + b*stepGateB[s][i*DIM+j]) * qn[j];
      su += (a*stepUpA[s][i*DIM+j] + b*stepUpB[s][i*DIM+j]) * qn[j];
    }
    gate[i] = sg;
    up[i] = su;
  }
  const swiglu = new Float32Array(HDIM);
  for (let i = 0; i < HDIM; i++)
    swiglu[i] = silu(gate[i]) * up[i];

  // Down: hidden[DIM] = W_down[DIM,HDIM] @ swiglu[HDIM]
  const hidden = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++) {
    let sum = 0;
    for (let j = 0; j < HDIM; j++)
      sum += (a*stepDownA[s][i*HDIM+j] + b*stepDownB[s][i*HDIM+j]) * swiglu[j];
    hidden[i] = sum;
  }

  // Residual
  const out = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++) out[i] = qn[i] + hidden[i];

  // Logits = embed_out @ out (separate output embeddings, no weight tying)
  const logits = new Float32Array(NWORDS);
  for (let v = 0; v < NWORDS; v++) {
    let sum = 0;
    for (let d = 0; d < DIM; d++)
      sum += (a*embed_out_A[v*DIM+d] + b*embed_out_B[v*DIM+d]) * out[d];
    logits[v] = sum;
  }

  return logits;
}

// ═══ FORWARD STEP (TRAINED) — same RRPRAM pipeline, but scores via embed_in over extVocab ═══
// When weights are loaded from training, embed_out is limited to NWORDS.
// forwardStepTrained scores every word in extVocab by averaging dot products
// of (blended embed_in) with the hidden output, over each word's BPE tokens.
// This lets the model produce any word whose BPE encoding maps to learned embeddings.

function forwardStepTrained(bpeIds, stepIdx) {
  const s = stepIdx % STEPS;
  const a = getBlendAlpha(), b = 1 - a;

  // Pool context: average blended embed_in over all BPE tokens (identical to forwardStep)
  const ctx = new Float32Array(DIM);
  const n = bpeIds.length || 1;
  for (const id of bpeIds) {
    if (id >= BPE_VOCAB) continue;
    for (let d = 0; d < DIM; d++)
      ctx[d] += a * embed_in_A[id*DIM+d] + b * embed_in_B[id*DIM+d];
  }
  for (let d = 0; d < DIM; d++) ctx[d] /= n;

  // RRPRAM: query = ctx @ Wr (blended)
  const query = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++) {
    let sum = 0;
    for (let j = 0; j < DIM; j++)
      sum += (a*stepWrA[s][i*DIM+j] + b*stepWrB[s][i*DIM+j]) * ctx[j];
    query[i] = sum;
  }

  // RMSNorm
  let ss = 0;
  for (let i = 0; i < DIM; i++) ss += query[i]*query[i];
  const rmsInv = 1 / Math.sqrt(ss/DIM + 1e-5);
  const qn = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++)
    qn[i] = (a*stepRmsA[s][i] + b*stepRmsB[s][i]) * query[i] * rmsInv;

  // SwiGLU
  const gate = new Float32Array(HDIM);
  const up = new Float32Array(HDIM);
  for (let i = 0; i < HDIM; i++) {
    let sg = 0, su = 0;
    for (let j = 0; j < DIM; j++) {
      sg += (a*stepGateA[s][i*DIM+j] + b*stepGateB[s][i*DIM+j]) * qn[j];
      su += (a*stepUpA[s][i*DIM+j] + b*stepUpB[s][i*DIM+j]) * qn[j];
    }
    gate[i] = sg;
    up[i] = su;
  }
  const swiglu = new Float32Array(HDIM);
  for (let i = 0; i < HDIM; i++)
    swiglu[i] = silu(gate[i]) * up[i];

  // Down projection
  const hidden = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++) {
    let sum = 0;
    for (let j = 0; j < HDIM; j++)
      sum += (a*stepDownA[s][i*HDIM+j] + b*stepDownB[s][i*HDIM+j]) * swiglu[j];
    hidden[i] = sum;
  }

  // Residual
  const out = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++) out[i] = qn[i] + hidden[i];

  // Score each word in extVocab via embed_in (not embed_out)
  // For each word: score = mean of dot(blended_embed_in[tok], out) over its BPE tokens
  const logits = new Float32Array(extVocab.length);
  for (let w = 0; w < extVocab.length; w++) {
    const ids = extVocab[w].bpeIds;
    const bpeLen = ids.length || 1;
    let score = 0;
    for (const tid of ids) {
      if (tid >= BPE_VOCAB) continue;
      let dot = 0;
      for (let d = 0; d < DIM; d++)
        dot += (a * embed_in_A[tid*DIM+d] + b * embed_in_B[tid*DIM+d]) * out[d];
      score += dot;
    }
    logits[w] = score / bpeLen;
  }

  return logits;
}

// ═══ DARIO OVERLAY — heuristic forces applied on top of learned logits ═══

// vocabForOverlay: array of {word, origIdx} — tells darioOverlay which words
// are in the logits array and what their original WORDS[] index is (for bigram/cooc lookup).
// For untrained mode: [{word: WORDS[i], origIdx: i}, ...] (length=NWORDS)
// For trained mode: extVocab entries (origIdx=-1 for BPE-derived words — no bigram/cooc data)

function darioOverlay(logits, wordContext, prevWord, stepIdx, direction, vocabForOverlay) {
  const alpha_mod = 1 + 0.3*chambers[CH.LOVE] - 0.2*chambers[CH.RAGE] + 0.1*chambers[CH.FLOW];
  const gamma_mod = 1 + 0.4*chambers[CH.VOID] + 0.2*chambers[CH.COMPLEX];
  const calMod = 1 + 0.2 * calendarDissonance(calendarDaysSinceEpoch());
  const dirMod = direction === -1 ? 0.8 : 1.2;
  const gateR = 1 / (1 + Math.exp(-(resonanceField - 0.5) * 4));
  const h_g = silu(gateR * 2);
  const f_g = silu(gateR * 1.5);

  const nVocab = vocabForOverlay.length;
  for (let v = 0; v < nVocab; v++) {
    const oi = vocabForOverlay[v].origIdx;
    let B = 0;
    // Bigram/cooc only available for words that exist in WORDS[] (origIdx >= 0)
    if (oi >= 0 && prevWord >= 0) B = Math.log(1 + getBigram(prevWord, oi)) * 4;

    let H = 0;
    if (oi >= 0) {
      for (const c of wordContext) H += Math.log(1 + getCooc(c, oi));
      H /= (wordContext.length + 1);
    }

    const F = prophecyDebt * (1 + Math.random() * 0.5);
    const A = destinyBias * gamma_mod * 0.5;

    logits[v] += (B + alpha_mod * 3 * H * h_g + 2 * F * f_g + A) * dirMod * calMod;
  }
}

// ═══ WORD SELECTION — forward_step + dario overlay + top-k sampling ═══

function selectWord(bpeContext, wordContext, prevWord, stepIdx, forbidden, direction) {
  let logits, vocab;

  if (hasWeights && extVocab.length > 0) {
    // Trained mode: use forwardStepTrained over extended vocab
    logits = forwardStepTrained(bpeContext, stepIdx);
    vocab = extVocab;
  } else {
    // Untrained mode: use forwardStep over NWORDS hardcoded vocab
    logits = forwardStep(bpeContext, stepIdx);
    vocab = [];
    for (let i = 0; i < NWORDS; i++)
      vocab.push({ word: WORDS[i], bpeIds: vocabBpe[i], fromHardcoded: true, origIdx: i });
  }

  darioOverlay(logits, wordContext, prevWord, stepIdx, direction, vocab);

  // Build candidates, applying forbidden filter
  // forbidden is a Set of WORDS[] indices — for extVocab entries with origIdx >= 0,
  // check origIdx; for BPE-derived words (origIdx=-1), check word string against
  // forbidden words set (built lazily)
  let forbiddenWords = null;
  const indexed = [];
  for (let i = 0; i < vocab.length; i++) {
    const entry = vocab[i];
    // Check forbidden by origIdx for hardcoded words
    if (entry.origIdx >= 0 && forbidden.has(entry.origIdx)) continue;
    // Check forbidden by word string for BPE-derived words
    if (entry.origIdx < 0) {
      if (!forbiddenWords) {
        forbiddenWords = new Set();
        for (const fi of forbidden) {
          if (typeof fi === 'number' && fi >= 0 && fi < NWORDS) forbiddenWords.add(WORDS[fi]);
          else if (typeof fi === 'string') forbiddenWords.add(fi);
        }
      }
      if (forbiddenWords.has(entry.word)) continue;
    }
    indexed.push({ word: entry.word, idx: entry.origIdx >= 0 ? entry.origIdx : -(i+1), extIdx: i, score: logits[i] });
  }

  if (indexed.length === 0) return { word: 'void', idx: 0, extIdx: 0, score: 0 };

  indexed.sort((a, b) => b.score - a.score);
  const topK = Math.min(8, indexed.length);
  const top = indexed.slice(0, topK);

  let mx = top[0].score, sum = 0;
  for (const s of top) { s.prob = Math.exp(s.score - mx); sum += s.prob; }
  for (const s of top) s.prob /= sum;

  let r = Math.random(), cum = 0;
  for (const s of top) { cum += s.prob; if (cum >= r) return s; }
  return top[0];
}

// ═══ ORIGIN EXTRACTION (nanojanus-specific: find most "charged" word) ═══

function extractKey(text) {
  const ids = tokenizeWords(text);
  if (ids.length === 0) return Math.floor(Math.random() * NWORDS);
  let best = ids[0], bestScore = 0;
  for (const id of ids) {
    let sc = 0;
    for (const [k, v] of cooc) { const [a,b] = k.split(',').map(Number); if (a===id||b===id) sc += v; }
    if (sc > bestScore) { bestScore = sc; best = id; }
  }
  return best;
}

// ═══ HELPER — get BPE ids for a selected word ═══
function getSelBpeIds(sel) {
  // Hardcoded word: look up vocabBpe by idx
  if (sel.idx >= 0 && sel.idx < NWORDS) return vocabBpe[sel.idx];
  // Extended vocab word: look up extVocab by extIdx
  if (sel.extIdx !== undefined && sel.extIdx >= 0 && sel.extIdx < extVocab.length)
    return extVocab[sel.extIdx].bpeIds;
  // Fallback: BPE encode the word string
  return bpeEncode(sel.word);
}

// ═══ BI-DIRECTIONAL REASONING ═══

async function runChain(userText) {
  const column = document.getElementById('column');
  column.innerHTML = '';

  // BPE encode user input for forward step context
  const inputBpe = bpeEncode(userText);
  // Word-level tokenize for Dario overlay / co-occurrence
  const wordContext = tokenizeWords(userText);
  const seedIdx = extractKey(userText);
  const seedWord = WORDS[seedIdx] || 'void';

  // MetaJanus prophecy
  const calD = calendarDissonance(calendarDaysSinceEpoch());
  const predictedEntropy = 0.5 + 0.2*prophecyDebt + 0.1*calD + 0.15*personalDissonance();

  // Step direction split
  const nBackward = Math.max(1, Math.min(STEPS-1,
    Math.floor(STEPS * (0.3 + 0.4*prophecyDebt + 0.1*calD))));
  const nForward = STEPS - nBackward;

  updateMetrics();

  const forbidden = new Set();
  forbidden.add(seedIdx);
  const allSteps = [];

  // Show origin FIRST — everything grows outward from here
  const originEl = makeWordEl(`\u25cf ${seedWord} \u25cf`, 'origin', '', 0, false);
  column.appendChild(originEl);
  await sleep(600);

  // Two independent contexts growing simultaneously
  let fwdBpeCtx = [...inputBpe];
  let fwdWordCtx = [...wordContext];
  let fwdPrev = seedIdx;

  let bwdBpeCtx = [...inputBpe];
  let bwdWordCtx = [...wordContext];
  let bwdPrev = seedIdx;

  const maxSteps = Math.max(nForward, nBackward);

  for (let i = 0; i < maxSteps; i++) {
    // Generate BACKWARD word (prepend above origin — grows upward)
    if (i < nBackward) {
      updateChambers(nForward + i);
      const sel = selectWord(bwdBpeCtx, bwdWordCtx, bwdPrev, nForward + i, forbidden, -1);
      allSteps.push(sel);

      const el = makeWordEl(sel.word, 'backward', `\u2191${nForward+i}`, prophecyDebt, false);
      column.insertBefore(el, column.firstChild); // push to top

      // Get BPE ids: from vocabBpe if hardcoded word, from extVocab if extended
      const wb = getSelBpeIds(sel);
      if (wb) for (const t of wb) bwdBpeCtx.push(t);
      if (sel.idx >= 0) bwdWordCtx.push(sel.idx);
      forbidden.add(sel.idx >= 0 ? sel.idx : sel.word);
      prophecyDebt = 0.9 * prophecyDebt + 0.1 * computeProphecyDebt([sel], 0);
      bwdPrev = sel.idx >= 0 ? sel.idx : -1;
    }

    // Generate FORWARD word (append below origin — grows downward)
    if (i < nForward) {
      updateChambers(i);
      let isWormhole = false;
      if (prophecyDebt < 0.2 && wormhole > 0.1 && Math.random() < wormhole) {
        isWormhole = true;
      }
      const sel = selectWord(fwdBpeCtx, fwdWordCtx, fwdPrev, i, forbidden, 1);
      allSteps.push(sel);

      const el = makeWordEl(sel.word, 'forward', `\u2193${i}`, prophecyDebt, isWormhole);
      column.appendChild(el); // append to bottom

      const wb = getSelBpeIds(sel);
      if (wb) for (const t of wb) fwdBpeCtx.push(t);
      if (sel.idx >= 0) fwdWordCtx.push(sel.idx);

      if (sel.idx >= 0 && fwdPrev >= 0) updateBigram(fwdPrev, sel.idx);
      if (sel.idx >= 0) {
        for (const c of wordContext) updateCooc(c, sel.idx);
      }
      forbidden.add(sel.idx >= 0 ? sel.idx : sel.word);
      prophecyDebt = 0.9 * prophecyDebt + 0.1 * computeProphecyDebt([sel], 0);
      fwdPrev = sel.idx >= 0 ? sel.idx : -1;
    }

    // Both directions appear at the same tick
    await sleep(700);
  }

  // Evaluate MetaJanus prophecy
  const avgDebt = allSteps.length > 0
    ? allSteps.reduce((s,x) => s + (x.debt || 0), 0) / allSteps.length : 0;
  const error = Math.abs(predictedEntropy - avgDebt);
  META.prophecyAccuracy = 0.9 * META.prophecyAccuracy + 0.1 * (1 - error);
  META.totalPredictions++;
  updateMetrics();
}

// ═══ DISPLAY ═══

function makeWordEl(word, cls, label, debt, isWormhole) {
  const div = document.createElement('div');
  div.className = `word-line ${cls}${isWormhole ? ' wormhole' : ''}`;
  let html = '';
  if (label) html += `<span class="step-num">${label}</span>`;
  html += word;
  if (debt > 0) html += `<span class="step-debt">debt=${debt.toFixed(2)}</span>`;
  if (isWormhole) html += `<span class="step-debt"> \u2295WH</span>`;
  div.innerHTML = html;
  return div;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateMetrics() {
  const days = calendarDaysSinceEpoch();
  const drift = calendarCumulativeDrift(days).toFixed(2);
  const diss = calendarDissonance(days).toFixed(3);
  const pd = personalDissonance().toFixed(3);
  const blend = getBlendAlpha().toFixed(3);
  const wMode = hasWeights ? 'TRAINED' : 'dario';
  const extN = extVocab.length;
  document.getElementById('metrics').textContent =
    `drift=${drift}  diss=${diss}  personal=${pd}  blend=${blend}  ` +
    `debt=${prophecyDebt.toFixed(3)}  prophecy_acc=${META.prophecyAccuracy.toFixed(3)}  ` +
    `bpe=${BPE_VOCAB}  words=${NWORDS}  ext=${extN}  mode=${wMode}`;
}

// ═══ WEIGHT LOADING — sets hasWeights=true when trained weights are available ═══
// Expects an ArrayBuffer of float32 values laid out as:
//   embed_in_A[BPE_VOCAB*DIM] + embed_in_B[BPE_VOCAB*DIM] +
//   embed_out_A[NWORDS*DIM] + embed_out_B[NWORDS*DIM] +
//   for each step s in 0..STEPS-1:
//     stepWrA[s][DIM*DIM] + stepWrB[s][DIM*DIM] +
//     stepRmsA[s][DIM] + stepRmsB[s][DIM] +
//     stepGateA[s][HDIM*DIM] + stepUpA[s][HDIM*DIM] + stepDownA[s][DIM*HDIM] +
//     stepGateB[s][HDIM*DIM] + stepUpB[s][HDIM*DIM] + stepDownB[s][DIM*HDIM]

async function loadWeights(url) {
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('fetch failed: ' + resp.status);
    const buf = await resp.arrayBuffer();
    const f32 = new Float32Array(buf);
    let off = 0;

    function readSlice(len) {
      const slice = f32.subarray(off, off + len);
      off += len;
      return slice;
    }

    embed_in_A = new Float32Array(readSlice(BPE_VOCAB * DIM));
    embed_in_B = new Float32Array(readSlice(BPE_VOCAB * DIM));
    embed_out_A = new Float32Array(readSlice(NWORDS * DIM));
    embed_out_B = new Float32Array(readSlice(NWORDS * DIM));

    for (let s = 0; s < STEPS; s++) {
      stepWrA[s] = new Float32Array(readSlice(DIM * DIM));
      stepWrB[s] = new Float32Array(readSlice(DIM * DIM));
      stepRmsA[s] = new Float32Array(readSlice(DIM));
      stepRmsB[s] = new Float32Array(readSlice(DIM));
      stepGateA[s] = new Float32Array(readSlice(HDIM * DIM));
      stepUpA[s] = new Float32Array(readSlice(HDIM * DIM));
      stepDownA[s] = new Float32Array(readSlice(DIM * HDIM));
      stepGateB[s] = new Float32Array(readSlice(HDIM * DIM));
      stepUpB[s] = new Float32Array(readSlice(HDIM * DIM));
      stepDownB[s] = new Float32Array(readSlice(DIM * HDIM));
    }

    hasWeights = true;
    buildExtendedVocab(); // rebuild in case vocab changed
    console.log('[nanojanus] weights loaded: ' + f32.length + ' floats from ' + url + ', hasWeights=true');
    updateMetrics();
  } catch(e) {
    console.error('[nanojanus] weight loading failed: ' + e.message);
    hasWeights = false;
  }
}

// Training is done via nanojanus.py (CLI). No in-browser training.

// ═══ EVENT HANDLERS ═══
const inputEl = document.getElementById('prompt');
const sendBtn = document.getElementById('send');

async function submit() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  await runChain(text);
}

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
sendBtn.addEventListener('click', submit);

updateMetrics();
</script>
