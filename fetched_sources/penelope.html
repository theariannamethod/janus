<meta charset="UTF-8">

<title>Penelope</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&display=swap');

  :root {
    --bg: #fafaf8;
    --fg: #1a1a1a;
    --dim: #777;
    --ghost: #999;
    --accent: #1a1a1a;
    --serif: 'EB Garamond', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--serif);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── LOGO ── */
  #logo {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #888;
    user-select: none;
    font-weight: 500;
  }

  #eight {
    position: fixed;
    top: 18px;
    right: 28px;
    font-size: 22px;
    color: #999;
    font-weight: 700;
    user-select: none;
    opacity: 0.4;
    letter-spacing: 2px;
  }

  /* ── MAIN AREA ── */
  #arena {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 80px 40px 120px;
    overflow: hidden;
  }

  /* prophecy whisper */
  #prophecy {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-style: italic;
    color: var(--ghost);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 1.5s ease;
    text-align: center;
  }
  #prophecy.visible { opacity: 1; }

  /* word column */
  #column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
  }

  .word-line {
    font-size: 23px;
    font-weight: 400;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(12px);
    animation: word-arrive 0.8s ease forwards;
    text-align: center;
    line-height: 1.3;
  }

  .word-line.seed {
    font-weight: 700;
    font-size: 27px;
    color: var(--accent);
  }

  .word-line.step { color: var(--fg); }

  .word-line.final {
    font-weight: 700;
    font-size: 25px;
    border-bottom: 1px solid var(--dim);
    padding-bottom: 4px;
  }

  @keyframes word-arrive {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* step counter */
  .step-num {
    position: absolute;
    left: 28px;
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
  }

  /* ── METRICS (shown after chain completes) ── */
  #metrics {
    position: fixed;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ghost);
    text-align: center;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #metrics.visible { opacity: 1; }

  /* ── INPUT ── */
  #input-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid #ccc;
    background: var(--bg);
  }

  #input-bar input {
    background: none;
    border: none;
    border-bottom: 1px solid #bbb;
    outline: none;
    font-family: var(--serif);
    font-size: 15px;
    color: var(--fg);
    text-align: center;
    width: 400px;
    letter-spacing: 0.5px;
    padding-bottom: 2px;
  }
  #input-bar input::placeholder {
    color: #999;
    font-style: italic;
  }
  #input-bar input:focus {
    border-bottom-color: var(--fg);
  }

  #send-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    margin-left: 8px;
    color: #999;
    font-size: 20px;
    line-height: 1;
    transition: color 0.2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #send-btn:hover { color: var(--fg); }
  #send-btn:active { color: var(--fg); transform: scale(0.9); }
  #send-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── WAITING STATE ── */
  #waiting {
    font-size: 14px;
    color: var(--ghost);
    font-style: italic;
    letter-spacing: 1px;
  }
</style>
</head>

<div id="logo">penelope</div>
<div id="eight">12</div>
<div id="prophecy"></div>

<div id="arena">
  <div id="waiting">waiting</div>
  <div id="column"></div>

// ── STOPWORDS ──
const STOP = new Set("i me my we our you your he she it they them the a an and or but in on at to for of is am are was were be been being have has had do does did will would shall should can could may might must not no nor so if then than that this these those what which who whom how when where why all each every some any few many much more most other another such".split(" "));

// ═══════════════════════════════════════════════════════════════
// BPE INPUT — stem + greedy longest vocab match
//
// Three-stage tokenizer for arbitrary text:
//   1. Exact vocab match     ("fire" → fire)
//   2. Suffix stripping       ("burning" → burn, "created" → create)
//   3. Greedy decomposition   ("heartbreak" → heart + break)
//
// The 1984 vocab words ARE the BPE token vocabulary.
// Greedy longest-match IS BPE encoding.
// ═══════════════════════════════════════════════════════════════

const SUFFIXES = [
  "ting","ning","ring","ling","ding","ping","bing","ging","ming","king",
  "sing","zing",
  "ing","ment","ness","tion","sion","able","ible","ence","ance",
  "eous","ious","ful","less","ize","ise","ous","ive","ity",
  "ly","er","ed","est","al","en","es","s"
];

const VOCAB_LENS = VOCAB.map(w => w.length);

function tryStem(word) {
  const wlen = word.length;
  for (const suffix of SUFFIXES) {
    const slen = suffix.length;
    if (wlen <= slen + 2) continue;
    if (!word.endsWith(suffix)) continue;
    const stem = word.slice(0, wlen - slen);
    // exact stem
    let idx = VOCAB.indexOf(stem);
    if (idx >= 0) return idx;
    // stem + 'e' (creat→create, danc→dance)
    idx = VOCAB.indexOf(stem + 'e');
    if (idx >= 0) return idx;
    // doubled consonant (runn→run, swimm→swim)
    if (stem.length >= 3 && stem[stem.length - 1] === stem[stem.length - 2]) {
      idx = VOCAB.indexOf(stem.slice(0, -1));
      if (idx >= 0) return idx;
    }
  }
  return -1;
}

function greedyVocabMatch(word) {
  const wlen = word.length;
  const ids = [];
  let pos = 0;
  while (pos < wlen && ids.length < 8) {
    let best = -1, bestLen = 0;
    for (let v = 0; v < VOCAB.length; v++) {
      const vl = VOCAB_LENS[v];
      if (vl <= bestLen || vl > wlen - pos) continue;
      if (word.startsWith(VOCAB[v], pos)) {
        best = v;
        bestLen = vl;
      }
    }
    if (best >= 0 && bestLen >= 3) {
      ids.push(best);
      pos += bestLen;
    } else {
      pos++;
    }
  }
  return ids;
}

function tokenizeText(text) {
  const lower = text.toLowerCase();
  const ids = [];
  let pos = 0;
  while (pos < lower.length) {
    // skip non-alpha
    while (pos < lower.length && !/[a-z]/.test(lower[pos])) pos++;
    if (pos >= lower.length) break;
    // extract word
    let wl = 0;
    const start = pos;
    while (pos < lower.length && /[a-z]/.test(lower[pos])) { pos++; wl++; }
    const word = lower.slice(start, start + wl);
    if (wl < 2 || STOP.has(word)) continue;
    // 1. exact vocab match
    let idx = VOCAB.indexOf(word);
    if (idx >= 0) { ids.push(idx); continue; }
    // 2. stem + match
    idx = tryStem(word);
    if (idx >= 0) { ids.push(idx); continue; }
    // 3. greedy longest vocab match (BPE decomposition)
    const sub = greedyVocabMatch(word);
    for (const s of sub) {
      if (ids.length === 0 || ids[ids.length - 1] !== s) {
        ids.push(s);
      }
    }
  }
  return ids;
}

// ═══════════════════════════════════════════════════════════════
// DARIO FIELD — co-occurrence, prophecy, destiny, trauma
// ═══════════════════════════════════════════════════════════════

const cooc = new Map(); // "word1|word2" → count
const bigrams = new Map(); // "word" → Map(next → count)
let destiny = new Array(8).fill(0); // semantic compass (category buckets)
let trauma = 0;
let prophecyTarget = null;
let prophecyAge = 0;
let totalSteps = 0;

function wordCategory(idx) {
  if (idx < 100) return 0; // body
  if (idx < 200) return 1; // nature
  if (idx < 300) return 2; // emotion
  if (idx < 350) return 3; // time
  if (idx < 450) return 4; // society
  if (idx < 550) return 5; // abstract
  if (idx < 650) return 6; // action
  return 7; // everything else
}

function updateCooc(w1, w2) {
  const k = w1 < w2 ? w1+"|"+w2 : w2+"|"+w1;
  cooc.set(k, (cooc.get(k)||0) + 1);
}

function getCooc(w1, w2) {
  const k = w1 < w2 ? w1+"|"+w2 : w2+"|"+w1;
  return cooc.get(k) || 0;
}

function updateBigram(prev, next) {
  if (!bigrams.has(prev)) bigrams.set(prev, new Map());
  const m = bigrams.get(prev);
  m.set(next, (m.get(next)||0) + 1);
}

// ── KURAMOTO CHAMBERS ──
const chambers = { fear:0, love:0, rage:0, void_:0, flow:0, complex:0 };
const chamberDecay = { fear:0.95, love:0.95, rage:0.93, void_:0.96, flow:0.94, complex:0.97 };

function updateChambers(stepIdx) {
  // excite based on step depth (3 phases: surface/depth/bone)
  const depth = stepIdx / STEPS;
  const phase = depth < 0.33 ? 0 : depth < 0.66 ? 1 : 2;
  if (phase === 0) chambers.flow += 0.05;       // surface: curiosity
  if (phase === 1) chambers.fear += 0.04;        // depth: tension builds
  if (phase === 2) chambers.void_ += 0.05;       // bone: the abyss
  if (depth > 0.75) chambers.complex += 0.03;    // final quarter: complexity
  if (trauma > 0.3) chambers.rage += 0.04;

  // Kuramoto coupling
  const K = 0.02;
  const names = Object.keys(chambers);
  const old = {...chambers};
  for (const i of names)
    for (const j of names)
      if (i !== j) chambers[i] += K * Math.sin(old[j] - old[i]);

  // decay
  for (const k of names) {
    chambers[k] *= chamberDecay[k] || 0.95;
    chambers[k] = Math.max(0, Math.min(1, chambers[k]));
  }
}

// ═══════════════════════════════════════════════════════════════
// DARIO EQUATION — the selection mechanism
//
// score(w) = B + α·H + β·F + γ·A + T
//   B = bigram affinity with previous word
//   H = Hebbian co-occurrence with context
//   F = prophecy fulfillment pressure
//   A = destiny attraction
//   T = trauma gravity (pulls toward deep words)
// ═══════════════════════════════════════════════════════════════

function darioScore(candidate, context, prevWord, stepIdx) {
  const cidx = VOCAB.indexOf(candidate);
  if (cidx < 0) return -Infinity;

  // somatic modulation from chambers
  const alpha_mod = 1 + 0.3*chambers.love - 0.2*chambers.rage + 0.1*chambers.flow;
  const beta_mod = 1 + 0.2*chambers.flow - 0.3*chambers.fear;
  const gamma_mod = 1 + 0.4*chambers.void_ + 0.2*chambers.complex;

  // B: bigram
  let B = 0;
  if (prevWord && bigrams.has(prevWord)) {
    const m = bigrams.get(prevWord);
    B = (m.get(candidate) || 0) / (Math.max(...m.values()) + 1);
  }

  // H: Hebbian co-occurrence with full context
  let H = 0;
  for (const ctx of context) {
    H += getCooc(ctx, candidate) * (1 / (context.length - context.indexOf(ctx) + 1));
  }
  const h_max = Math.max(H, 1);
  H /= h_max;

  // F: prophecy fulfillment
  let F = 0;
  if (prophecyTarget && candidate === prophecyTarget) {
    F = 0.5 * Math.log(1 + prophecyAge);
  }

  // A: destiny attraction (category alignment)
  const cat = wordCategory(cidx);
  let A = destiny[cat] / (Math.max(...destiny.map(Math.abs)) + 0.01);

  // T: trauma (deeper words in later steps)
  let T = 0;
  if (trauma > 0.3 && stepIdx > 6) {
    // emotional and philosophical words get trauma boost
    if (cidx >= 200 && cidx < 300) T = trauma * 1.5;
    if (cidx >= 450 && cidx < 550) T = trauma * 1.2;
    if (cidx >= 930 && cidx < 1000) T = trauma * 1.0;
  }

  // wormhole: occasional category jump
  let wormhole = 0;
  if (Math.random() < 0.08 && stepIdx > 3 && stepIdx < 10) {
    // jump to unexpected category
    const jumpCat = Math.floor(Math.random() * 8);
    if (cat === jumpCat) wormhole = 0.5;
  }

  // step-specific vibe modulation (3 phases × 4 steps)
  // Phase 1 (surface): bright, exploratory
  // Phase 2 (depth): heavy, directed
  // Phase 3 (bone): sharp, final
  const vibes = [1.3, 1.1, 1.0, 0.9,  0.8, 0.7, 0.8, 0.9,  1.0, 0.8, 0.7, 1.4];
  const vibe = vibes[stepIdx] || 1.0;

  // temperature from depth
  const tau = 0.7 + stepIdx * 0.08;

  const score = (B * 8 + alpha_mod * 0.3 * H + beta_mod * 0.15 * F +
                 gamma_mod * 0.25 * A + T + wormhole) * vibe / tau;

  return score;
}

// ═══════════════════════════════════════════════════════════════
// SELECT WORD — Dario equation + diversity + no-repeat
// ═══════════════════════════════════════════════════════════════

function selectWord(context, prevWord, stepIdx, forbidden) {
  const scores = [];
  for (const w of VOCAB) {
    if (forbidden.has(w)) continue;
    scores.push({ word: w, score: darioScore(w, context, prevWord, stepIdx) });
  }

  // add randomness weighted by step (early = more random, late = more directed)
  const noise = 0.3 * (1 - stepIdx / STEPS);
  for (const s of scores) s.score += Math.random() * noise;

  scores.sort((a, b) => b.score - a.score);

  // top-k sampling (k=12)
  const k = Math.min(12, scores.length);
  const topk = scores.slice(0, k);
  const sum = topk.reduce((s, x) => s + Math.max(0, x.score), 0.001);
  let r = Math.random() * sum;
  for (const t of topk) {
    r -= Math.max(0, t.score);
    if (r <= 0) return t.word;
  }
  return topk[0].word;
}

// ═══════════════════════════════════════════════════════════════
// EXTRACT KEY WORD — BPE tokenize input, return best vocab word
// ═══════════════════════════════════════════════════════════════

function extractKey(text) {
  const ids = tokenizeText(text);
  if (ids.length > 0) return VOCAB[ids[0]];
  // fallback: longest non-stop word
  const words = text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 1 && !STOP.has(w));
  if (words.length === 0) return text.toLowerCase().split(/\s+/)[0] || "silence";
  words.sort((a, b) => b.length - a.length);
  return words[0];
}

// ═══════════════════════════════════════════════════════════════
// PROPHECY — what Penelope predicts before the chain starts
// ═══════════════════════════════════════════════════════════════

function makeProphecy(seedWord) {
  // predict the final word based on seed category
  const idx = VOCAB.indexOf(seedWord);
  let cat = idx >= 0 ? wordCategory(idx) : 5;

  // prophecy tends toward depth: emotion, abstract, philosophy
  const deepCats = [2, 5, 7]; // emotion, abstract, other
  const targetCat = deepCats[Math.floor(Math.random() * deepCats.length)];
  const catStart = [0,100,200,300,350,450,550,650][targetCat] || 450;
  const catEnd = [100,200,300,350,450,550,650,1984][targetCat] || 550;
  const target = VOCAB[catStart + Math.floor(Math.random() * (catEnd - catStart))];

  prophecyTarget = target;
  prophecyAge = 0;
  return target;
}

// ═══════════════════════════════════════════════════════════════
// RUN CHAIN — 8 steps of resonance
// ═══════════════════════════════════════════════════════════════

async function runChain(userText) {
  const column = document.getElementById('column');
  const metrics = document.getElementById('metrics');
  const prophecyEl = document.getElementById('prophecy');
  const waiting = document.getElementById('waiting');
  column.innerHTML = '';
  metrics.classList.remove('visible');
  prophecyEl.classList.remove('visible');
  if (waiting) waiting.style.display = 'none';

  // BPE tokenize input — three-stage: exact → stem → greedy decomposition
  const inputIds = tokenizeText(userText);
  const inputWords = new Set(userText.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/));

  // seed = first BPE token, or fallback
  let seed;
  if (inputIds.length > 0) {
    seed = VOCAB[inputIds[0]];
  } else {
    // last resort: substring/prefix match
    const keyWord = extractKey(userText);
    seed = keyWord;
    if (!VOCAB.includes(seed)) {
      let best = null, bestScore = -1;
      for (const w of VOCAB) {
        let score = 0;
        if (w.includes(seed) || seed.includes(w)) score = 3;
        for (let i = 0; i < Math.min(w.length, seed.length); i++) {
          if (w[i] === seed[i]) score += 0.5;
          else break;
        }
        if (score > bestScore) { bestScore = score; best = w; }
      }
      if (best && bestScore > 0) seed = best;
      else seed = VOCAB[Math.floor(Math.random() * 200)];
    }
  }

  // prime Hebbian field with all input tokens
  for (let i = 1; i < inputIds.length; i++) {
    updateCooc(VOCAB[inputIds[i - 1]], VOCAB[inputIds[i]]);
  }

  // prophecy
  const prophesied = makeProphecy(seed);
  prophecyEl.textContent = `destined: ${prophesied}`;
  setTimeout(() => prophecyEl.classList.add('visible'), 300);

  // forbidden: input words + seed (no repetition)
  const forbidden = new Set([...inputWords, seed]);

  // show seed
  await showWord(column, seed, 'seed', 0);

  // 8 steps
  const chain = [seed];
  let prevWord = seed;
  let totalDebt = 0;

  for (let step = 0; step < STEPS; step++) {
    await sleep(1200 + step * 150); // slow suspense — each step heavier than the last

    updateChambers(step);
    prophecyAge++;

    const word = selectWord(chain, prevWord, step, forbidden);
    chain.push(word);
    forbidden.add(word);

    // update field
    updateCooc(prevWord, word);
    updateBigram(prevWord, word);
    const widx = VOCAB.indexOf(word);
    if (widx >= 0) {
      const cat = wordCategory(widx);
      destiny[cat] = 0.3 * 1 + 0.7 * destiny[cat];
    }

    // prophecy debt
    if (word !== prophecyTarget) {
      totalDebt += 0.1 * Math.log(1 + prophecyAge);
    } else {
      totalDebt = Math.max(0, totalDebt - 1);
    }

    // trauma from depth
    if (step > 7) trauma = Math.min(1, trauma + 0.1);
    trauma *= 0.97;

    // ingest into field
    for (const ctx of chain.slice(-4)) {
      updateCooc(ctx, word);
    }

    const cls = step === STEPS - 1 ? 'final' : 'step';
    await showWord(column, word, cls, step + 1);
    prevWord = word;
  }

  totalSteps += STEPS;

  // check if prophecy fulfilled
  const fulfilled = chain.includes(prophecyTarget);

  // show metrics
  await sleep(600);
  const cats = chain.map(w => wordCategory(VOCAB.indexOf(w))).filter(c => c >= 0);
  const uniqueCats = new Set(cats).size;
  metrics.innerHTML = `debt ${totalDebt.toFixed(2)} · resonance ${(cooc.size/100).toFixed(2)} · drift ${uniqueCats}/8 · prophecy ${fulfilled ? 'fulfilled' : 'unfulfilled'}`;
  metrics.classList.add('visible');

  // update prophecy display
  if (fulfilled) {
    prophecyEl.textContent = `destined: ${prophesied} ✓`;
  } else {
    prophecyEl.textContent = `destined: ${prophesied} — unfulfilled`;
  }
}

function showWord(container, word, cls, stepNum) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = `word-line ${cls}`;
    div.textContent = word;
    container.appendChild(div);
    // scroll into view smoothly
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    setTimeout(resolve, 100);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// INPUT
// ═══════════════════════════════════════════════════════════════

const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
let running = false;

async function submit() {
  if (running) return;
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  running = true;

  await runChain(text);

  running = false;
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
sendBtn.addEventListener('click', submit);

inputEl.focus();
